# Server Port
server.port=8082

# PostgreSQL Database (Laragon - Local)
spring.datasource.url=jdbc:postgresql://localhost:5432/smartpelayanan
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=

# JPA/Hibernate Config - PostgreSQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.type=postgresql
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# PostgreSQL UUID generation
spring.jpa.properties.hibernate.id.new_generator_mappings=true

# JWT Configuration
jwt.secret=SmartPelayananSecretKey2024YangSangatPanjangAgarAman
jwt.expiration=86400000

# Multipart Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Logging
logging.level.org.springframework.security=DEBUG
server.error.include-message=always
server.error.include-stacktrace=always
server.error.include-exception=true
