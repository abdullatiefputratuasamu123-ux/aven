# Server Port
server.port=${PORT:8082}

# PostgreSQL Database (Supabase)
# Fallback langsung ke database Supabase yang kita buat. Di Railway tetap bisa dioverride via Env Vars.
# Menggunakan IPv4 Transaction Pooler (port 6543) untuk mencegah issue Network Unreachable di Railway
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-0-ap-southeast-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0&options=project%3Dexbjucnmypfahezkrtrz}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.exbjucnmypfahezkrtrz}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:SmartPelayananDB2024!}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate Config - PostgreSQL
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.type=postgresql
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway migration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# PostgreSQL UUID generation
spring.jpa.properties.hibernate.id.new_generator_mappings=true

# JWT Configuration
jwt.secret=${JWT_SECRET:SmartPelayananSecretKey2024YangSangatPanjangAgarAman}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Multipart Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Logging
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:INFO}
server.error.include-message=always
server.error.include-stacktrace=${INCLUDE_STACKTRACE:never}
server.error.include-exception=false
