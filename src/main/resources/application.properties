# Server Port
server.port=${PORT:8082}

# PostgreSQL Database
# Local fallback: jdbc:postgresql://localhost:5432/smartpelayanan
# Railway: set SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, and SPRING_DATASOURCE_PASSWORD.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:smartpelayanan}}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${PGUSER:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD:}}

# JPA/Hibernate Config - PostgreSQL
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.type=postgresql
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway migration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# PostgreSQL UUID generation
spring.jpa.properties.hibernate.id.new_generator_mappings=true

# JWT Configuration
jwt.secret=${JWT_SECRET:SmartPelayananSecretKey2024YangSangatPanjangAgarAman}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Multipart Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Logging
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:INFO}
server.error.include-message=always
server.error.include-stacktrace=${INCLUDE_STACKTRACE:never}
server.error.include-exception=false
