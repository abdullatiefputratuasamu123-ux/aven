<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartPelayanan</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-body">
    <div class="login-card-custom">
        <div class="login-header">
            <div class="logo-svg">
                <svg width="48" height="56" viewBox="0 0 24 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L3 5.5V13C3 18.5 6.8 23.5 12 25.5C13.5 24.9 14.9 24 16 22.8" stroke="#1e40af" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
                    <path d="M21 11V5.5L12 2" stroke="#1e40af" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
                    <circle cx="12" cy="11" r="2" fill="#1e40af"/>
                    <path d="M16 18C16 15.8 14.2 14 12 14C9.8 14 8 15.8 8 18" fill="#1e40af"/>
                    <circle cx="7" cy="12.5" r="1.5" fill="#1e40af"/>
                    <path d="M9.5 18C9.5 16.3 8.2 15 6.5 15C4.8 15 3.5 16.3 3.5 18" fill="#1e40af"/>
                    <circle cx="17" cy="12.5" r="1.5" fill="#1e40af"/>
                    <path d="M20.5 18C20.5 16.3 19.2 15 17.5 15C16.8 15 16.1 15.2 15.6 15.6" fill="#1e40af"/>
                    <path d="M12 21.5L16 25.5L24 17" stroke="#1e40af" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <div class="login-header-text">
                <h1>SmartPelayanan</h1>
                <p>Sistem Pengaduan & Layanan Masyarakat</p>
            </div>
        </div>

        <div id="errorMsg" class="error-msg"></div>

        <form id="loginForm">
            <div class="form-group-custom">
                <label>Email</label>
                <div class="input-wrapper">
                    <i class="far fa-envelope left-icon"></i>
                    <input type="email" id="email" placeholder="Masukkan email" required>
                </div>
            </div>

            <div class="form-group-custom">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock left-icon"></i>
                    <input type="password" id="password" placeholder="Masukkan password" required>
                    <i class="far fa-eye right-icon" id="togglePassword" onclick="togglePass()"></i>
                </div>
            </div>

            <button type="submit" class="btn-masuk">Masuk</button>
        </form>

        <div class="divider-custom">
            <hr><span>atau</span><hr>
        </div>

        <div class="auth-links-custom">
            <span>Belum punya akun? <a href="/register">Daftar di sini</a></span>
        </div>

        <a href="/public-pengaduan" class="btn-lapor-public">
            <i class="fas fa-pen"></i> Laporkan Masalah Tanpa Login
        </a>

        <div class="test-accounts">
            <h4>Akun Demo</h4>
            <div class="account-grid">
                <div class="account-btn" onclick="fillLogin('admin@smartpelayanan.com', 'admin123')">
                    <div class="role">👤 Admin</div>
                    <div class="email">admin@smartpelayanan.com</div>
                    <div class="password">admin123</div>
                </div>
                <div class="account-btn" onclick="fillLogin('warga@gmail.com', 'warga123')">
                    <div class="role">👥 Warga 1</div>
                    <div class="email">warga@gmail.com</div>
                    <div class="password">warga123</div>
                </div>
                <div class="account-btn" onclick="fillLogin('warga2@gmail.com', 'warga123')">
                    <div class="role">👥 Warga 2</div>
                    <div class="email">warga2@gmail.com</div>
                    <div class="password">warga123</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePass() {
            const p = document.getElementById('password');
            const i = document.getElementById('togglePassword');
            if (p.type === 'password') {
                p.type = 'text';
                i.className = 'far fa-eye-slash right-icon';
            } else {
                p.type = 'password';
                i.className = 'far fa-eye right-icon';
            }
        }

        function fillLogin(email, password) {
            document.getElementById('email').value = email;
            document.getElementById('password').value = password;
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.textContent = 'Memproses...';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();
                const payload = data.data || data;

                if (res.ok && payload && payload.token) {
                    localStorage.setItem('token', payload.token);
                    localStorage.setItem('user', JSON.stringify(payload));
                    localStorage.setItem('role', payload.role);
                    localStorage.setItem('namaLengkap', payload.namaLengkap || '');
                    localStorage.setItem('email', payload.email || '');

                    const role = payload.role;
                    if (role === 'ADMIN') window.location.href = '/admin/dashboard';
                    else if (role === 'WARGA') window.location.href = '/warga/dashboard';
                    else window.location.href = '/login';
                } else {
                    document.getElementById('errorMsg').textContent = data.message || 'Login gagal. Periksa email dan password.';
                    document.getElementById('errorMsg').style.display = 'block';
                }
            } catch (err) {
                document.getElementById('errorMsg').textContent = 'Terjadi kesalahan. Silakan coba lagi.';
                document.getElementById('errorMsg').style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Masuk';
            }
        });
    </script>
</body>
</html>
