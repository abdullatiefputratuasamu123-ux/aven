# Server Port
server.port=8082

# H2 In-Memory Database for Local Development
spring.datasource.url=jdbc:h2:mem:smartpelayanan;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Config - H2
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Disable Flyway for local H2 development
spring.flyway.enabled=false

# JWT Configuration
jwt.secret=SmartPelayananSecretKey2024YangSangatPanjangAgarAman
jwt.expiration=86400000

# Multipart Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Logging
logging.level.org.springframework.security=INFO
server.error.include-message=always
server.error.include-stacktrace=never
server.error.include-exception=false
